<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Seite nicht gefunden | Aleksei Bespechnyi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .fade-in {
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="text-center space-y-6 fade-in max-w-lg mx-auto">
        <!-- Иконка -->
        <div class="relative mx-auto w-24 h-24 mb-4">
            <div class="absolute inset-0 bg-gradient-to-br from-pink-500 to-purple-500 rounded-full blur-2xl opacity-30 animate-pulse"></div>
            <div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-slate-900/80 border border-pink-500/30 text-5xl font-bold text-white shadow-lg">
                4<span class="text-pink-400">0</span>4
            </div>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold text-white tracking-wide">
            Seite nicht gefunden
        </h1>
        <p class="text-gray-300 text-base md:text-lg">
            Diese Seite existiert nicht (mehr). Vielleicht möchtest du zurück zur Startseite?
        </p>

        <!-- Кнопка -->
        <a href="/" class="inline-flex items-center bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white px-8 py-4 rounded-full font-semibold text-lg transition-all duration-300 hover:scale-105 shadow-2xl shadow-pink-500/20 mt-6">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Zur Startseite
        </a>

        <p class="text-gray-500 text-sm mt-8">
            Aleksei Bespechnyi · International Sales & Business Development
        </p>
    </div>
</body>
</html>
